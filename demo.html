<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 热血传奇 - 在线试玩版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 3px 3px 0 #8b0000;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #00ff00;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .game-frame {
            width: 100%;
            height: 600px;
            border: 4px solid #ffd700;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            background: #000;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            padding: 15px;
            background: linear-gradient(135deg, #e55039, #eb2f06);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(235, 47, 6, 0.4);
        }
        .btn-skill {
            background: linear-gradient(135deg, #4a69bd, #1e3799);
        }
        .status {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            border: 2px solid #333;
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            color: #78e08f;
            font-size: 0.9rem;
        }
        .stat-value {
            color: #f6b93b;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat {
            height: 200px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
        }
        .chat-entry {
            margin: 5px 0;
            padding: 5px;
            border-radius: 3px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .combat { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .heal { color: #78e08f; background: rgba(120, 224, 143, 0.1); }
        .info { color: #f6b93b; background: rgba(246, 185, 59, 0.1); }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 热血传奇</h1>
        <div class="subtitle">在线试玩版 - 完全可玩，不黑屏</div>
        
        <div class="game-frame" id="game-container"></div>
        
        <div class="status">
            <div class="stat">
                <div class="stat-label">等级</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">生命值</div>
                <div class="stat-value" id="hp">100/100</div>
            </div>
            <div class="stat">
                <div class="stat-label">魔法值</div>
                <div class="stat-value" id="mp">50/50</div>
            </div>
            <div class="stat">
                <div class="stat-label">经验值</div>
                <div class="stat-value" id="exp">0/100</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="attack()">⚔️ 攻击</button>
            <button class="btn btn-skill" onclick="useSkill('heal')">💚 治疗术</button>
            <button class="btn btn-skill" onclick="useSkill('magic')">🔮 魔法攻击</button>
            <button class="btn" onclick="refreshMonster()">🔄 刷新怪物</button>
        </div>
        
        <div class="chat" id="chat">
            <div class="chat-entry info">欢迎来到热血传奇！</div>
            <div class="chat-entry info">使用按钮或键盘控制游戏</div>
            <div class="chat-entry info">攻击：空格键 | 技能：1/2 | 刷新：R</div>
        </div>
        
        <div class="footer">
            <p>基于Phaser.js开发 | 技术支持: OpenClaw AI</p>
            <p>游戏状态: <span id="game-status" style="color: #00ff00;">✅ 正常运行</span></p>
        </div>
    </div>

    <script>
        // 游戏状态
        let game = {
            player: { level: 1, hp: 100, maxHp: 100, mp: 50, maxMp: 50, exp: 0, maxExp: 100, attack: "15-25", defense: 10 },
            monster: { name: "野猪", hp: 50, maxHp: 50, exp: 10, difficulty: "简单" },
            phaserGame: null
        };

        // 添加聊天
        function addChat(msg, type = 'info') {
            const chat = document.getElementById('chat');
            const entry = document.createElement('div');
            entry.className = `chat-entry ${type}`;
            entry.textContent = msg;
            chat.appendChild(entry);
            chat.scrollTop = chat.scrollHeight;
            if (chat.children.length > 20) chat.removeChild(chat.firstChild);
        }

        // 更新UI
        function updateUI() {
            document.getElementById('level').textContent = game.player.level;
            document.getElementById('hp').textContent = `${game.player.hp}/${game.player.maxHp}`;
            document.getElementById('mp').textContent = `${game.player.mp}/${game.player.maxMp}`;
            document.getElementById('exp').textContent = `${game.player.exp}/${game.player.maxExp}`;
        }

        // 攻击
        function attack() {
            if (game.monster.hp <= 0) {
                addChat('怪物已死，请刷新！', 'info');
                return;
            }
            
            const damage = Math.floor(Math.random() * 11) + 15;
            game.monster.hp -= damage;
            addChat(`你对${game.monster.name}造成 ${damage} 伤害！`, 'combat');
            
            if (game.monster.hp <= 0) {
                game.monster.hp = 0;
                game.player.exp += game.monster.exp;
                addChat(`🎉 击败${game.monster.name}，获得 ${game.monster.exp} 经验！`, 'combat');
                if (game.player.exp >= game.player.maxExp) {
                    game.player.level++;
                    game.player.maxHp = Math.floor(game.player.maxHp * 1.2);
                    game.player.hp = game.player.maxHp;
                    game.player.maxMp = Math.floor(game.player.maxMp * 1.2);
                    game.player.mp = game.player.maxMp;
                    game.player.exp = 0;
                    game.player.maxExp = Math.floor(game.player.maxExp * 1.5);
                    addChat(`🎊 升级到 ${game.player.level} 级！`, 'info');
                }
            } else {
                const monsterDamage = Math.floor(Math.random() * 8) + 3;
                game.player.hp -= Math.max(1, monsterDamage - game.player.defense);
                addChat(`${game.monster.name}对你造成 ${Math.max(1, monsterDamage - game.player.defense)} 伤害！`, 'combat');
            }
            
            if (game.player.hp <= 0) {
                game.player.hp = 0;
                addChat('💀 你被击败了！', 'combat');
                setTimeout(() => {
                    game.player.hp = Math.floor(game.player.maxHp / 2);
                    addChat('自动复活，生命恢复50%', 'info');
                    updateUI();
                }, 2000);
            }
            
            updateUI();
        }

        // 使用技能
        function useSkill(skill) {
            const skills = {
                heal: { name: '治疗术', cost: 10 },
                magic: { name: '魔法攻击', cost: 15 }
            };
            
            const s = skills[skill];
            if (game.player.mp >= s.cost) {
                game.player.mp -= s.cost;
                if (skill === 'heal') {
                    const heal = Math.floor(game.player.maxHp * 0.3);
                    game.player.hp = Math.min(game.player.maxHp, game.player.hp + heal);
                    addChat(`使用${s.name}，恢复 ${heal} 生命`, 'heal');
                } else {
                    const damage = Math.floor(Math.random() * 15) + 10;
                    game.monster.hp -= damage;
                    addChat(`使用${s.name}，造成 ${damage} 魔法伤害！`, 'combat');
                    if (game.monster.hp <= 0) {
                        game.monster.hp = 0;
                        game.player.exp += game.monster.exp;
                        addChat(`🎉 击败${game.monster.name}！`, 'combat');
                    }
                }
                updateUI();
            } else {
                addChat('魔法值不足！', 'info');
            }
        }

        // 刷新怪物
        function refreshMonster() {
            const monsters = [
                { name: "野猪", hp: 50, exp: 10, difficulty: "简单" },
                { name: "骷髅兵", hp: 80, exp: 15, difficulty: "普通" },
                { name: "狼", hp: 65, exp: 12, difficulty: "简单" },
                { name: "哥布林", hp: 70, exp: 13, difficulty: "普通" },
                { name: "僵尸", hp: 100, exp: 20, difficulty: "困难" }
            ];
            game.monster = { ...monsters[Math.floor(Math.random() * monsters.length)] };
            addChat(`发现了 ${game.monster.name}（${game.monster.difficulty}）！`, 'info');
        }

        // 初始化Phaser游戏
        function initPhaser() {
            if (typeof Phaser === 'undefined') {
                addChat('❌ Phaser加载失败', 'info');
                return;
            }
            
            const config = {
                type: Phaser.AUTO,
                width: 800,
                height: 600,
                parent: 'game-container',
                backgroundColor: '#0a0a0a',
                physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
                scene: {
                    preload: function() {
                        this.load.image('player', 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIxMiIgZmlsbD0iIzQxNjllMSIvPjwvc3ZnPg==');
                        this.load.image('monster', 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIxMiIgZmlsbD0iI2ZmMDAwMCIvPjwvc3ZnPg==');
                    },
                    create: function() {
                        this.player = this.physics.add.sprite(400, 300, 'player');
                        this.player.setCollideWorldBounds(true);
                        
                        this.monster = this.physics.add.sprite(200, 200, 'monster');
                        this.monster.setCollideWorldBounds(true);
                        
                        this.cursors = this.input.keyboard.createCursorKeys();
                        this.space = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                        
                        addChat('✅ 游戏画面加载成功！', 'info');
                    },
                    update: function() {
                        this.player.setVelocity(0);
                        if (this.cursors.left.isDown) this.player.setVelocityX(-200);
                        if (this.cursors.right.isDown) this.player.setVelocityX(200);
                        if (this.cursors.up.isDown) this.player.setVelocityY(-200);
                        if (this.cursors.down.isDown) this.player.setVelocityY(200);
                        
                        if (Phaser.Input.Keyboard.JustDown(this.space)) {
                            attack();
                            this.player.setTint(0xffffff);
                            this.time.delayedCall(100, () => this.player.clearTint());
                        }
                    }
                }
            };
            
            try {
                game.phaserGame = new Phaser.Game(config);
                document.getElementById('game-status').textContent = '✅ 游戏运行中';
            } catch (e) {
                addChat('⚠️ 游戏画面初始化失败，但核心功能正常', 'info');
                document.getElementById('game-status').textContent = '⚠️ 核心功能正常';
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                attack();
            } else if (e.key === '1') {
                useSkill('heal');
            } else if (e.key === '2') {
                useSkill('magic');
            } else if (e.key.toLowerCase() === 'r') {
                refreshMonster();
            }
        });

        // 初始化
        window.addEventListener('load', () => {
            updateUI();
            addChat('游戏初始化完成！', 'info');
            setTimeout(initPhaser, 1000);
        });
    </script>
</body>
</html>
