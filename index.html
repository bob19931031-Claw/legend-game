<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传奇页游 - 测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c2461, #1e3799);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #f6b93b;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 3rem;
            color: #f6b93b;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #78e08f;
        }
        
        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .game-canvas {
            flex: 3;
            min-width: 300px;
            background: #000;
            border: 3px solid #f6b93b;
            border-radius: 10px;
            overflow: hidden;
        }
        
        #game {
            width: 100%;
            height: 600px;
        }
        
        .game-info {
            flex: 1;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4a69bd;
            border-radius: 10px;
            padding: 20px;
        }
        
        .info-section {
            margin-bottom: 25px;
        }
        
        .info-section h3 {
            color: #4a69bd;
            border-bottom: 1px solid #4a69bd;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        
        .player-stats p, .monster-info p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .stat-label {
            color: #78e08f;
        }
        
        .stat-value {
            color: #f6b93b;
            font-weight: bold;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .control-btn {
            background: #4a69bd;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .control-btn:hover {
            background: #1e3799;
            transform: translateY(-2px);
        }
        
        .control-btn:active {
            transform: translateY(0);
        }
        
        .attack-btn {
            background: #e55039;
            grid-column: span 3;
        }
        
        .attack-btn:hover {
            background: #eb2f06;
        }
        
        .log {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #78e08f;
            border-radius: 5px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 3px 5px;
            border-radius: 3px;
        }
        
        .log-info {
            background: rgba(120, 224, 143, 0.1);
            color: #78e08f;
        }
        
        .log-combat {
            background: rgba(229, 80, 57, 0.1);
            color: #e55039;
        }
        
        .log-loot {
            background: rgba(246, 185, 59, 0.1);
            color: #f6b93b;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #4a69bd;
            margin-top: 30px;
            color: #78e08f;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }
            
            #game {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚔️ 传奇页游</h1>
            <p class="subtitle">经典传奇玩法 · HTML5技术 · 随时开战</p>
        </header>
        
        <div class="game-container">
            <div class="game-canvas">
                <div id="game"></div>
            </div>
            
            <div class="game-info">
                <div class="info-section player-stats">
                    <h3>👤 角色状态</h3>
                    <p><span class="stat-label">生命值:</span> <span id="hp" class="stat-value">100/100</span></p>
                    <p><span class="stat-label">魔法值:</span> <span id="mp" class="stat-value">50/50</span></p>
                    <p><span class="stat-label">等级:</span> <span id="level" class="stat-value">1</span></p>
                    <p><span class="stat-label">经验:</span> <span id="exp" class="stat-value">0/100</span></p>
                    <p><span class="stat-label">攻击力:</span> <span id="attack" class="stat-value">10-15</span></p>
                    <p><span class="stat-label">防御力:</span> <span id="defense" class="stat-value">5</span></p>
                </div>
                
                <div class="info-section monster-info">
                    <h3>👹 怪物信息</h3>
                    <p><span class="stat-label">当前目标:</span> <span id="monster-name" class="stat-value">野猪</span></p>
                    <p><span class="stat-label">怪物血量:</span> <span id="monster-hp" class="stat-value">50/50</span></p>
                    <p><span class="stat-label">掉落经验:</span> <span id="monster-exp" class="stat-value">10</span></p>
                    <p><span class="stat-label">掉落物品:</span> <span id="monster-loot" class="stat-value">猪肉、铜币</span></p>
                </div>
                
                <div class="controls">
                    <button class="control-btn" onclick="move('up')">↑ 上</button>
                    <button class="control-btn" onclick="move('left')">← 左</button>
                    <button class="control-btn" onclick="move('right')">→ 右</button>
                    <button class="control-btn" onclick="move('down')">↓ 下</button>
                    <button class="control-btn" onclick="useSkill('heal')">💊 治疗</button>
                    <button class="control-btn" onclick="useSkill('magic')">✨ 魔法</button>
                    <button class="control-btn attack-btn" onclick="attack()">⚔️ 攻击怪物</button>
                </div>
            </div>
        </div>
        
        <div class="info-section">
            <h3>📜 战斗日志</h3>
            <div id="combat-log" class="log">
                <div class="log-entry log-info">欢迎来到传奇页游！</div>
                <div class="log-entry log-info">使用方向键或按钮移动角色</div>
                <div class="log-entry log-info">点击"攻击怪物"开始战斗</div>
            </div>
        </div>
        
        <footer>
            <p>传奇页游测试版 · 基于Phaser.js开发 · 部署于Vercel</p>
            <p>使用键盘方向键或屏幕按钮控制角色移动和战斗</p>
        </footer>
    </div>

    <!-- Phaser.js 游戏引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- 游戏逻辑 -->
    <script src="game.js"></script>
    
    <!-- 界面交互 -->
    <script>
        // 游戏状态
        let gameState = {
            player: {
                hp: 100,
                maxHp: 100,
                mp: 50,
                maxMp: 50,
                level: 1,
                exp: 0,
                maxExp: 100,
                attackMin: 10,
                attackMax: 15,
                defense: 5
            },
            monster: {
                name: "野猪",
                hp: 50,
                maxHp: 50,
                exp: 10,
                loot: ["猪肉", "铜币"]
            },
            log: []
        };
        
        // 更新界面显示
        function updateUI() {
            document.getElementById('hp').textContent = `${gameState.player.hp}/${gameState.player.maxHp}`;
            document.getElementById('mp').textContent = `${gameState.player.mp}/${gameState.player.maxMp}`;
            document.getElementById('level').textContent = gameState.player.level;
            document.getElementById('exp').textContent = `${gameState.player.exp}/${gameState.player.maxExp}`;
            document.getElementById('attack').textContent = `${gameState.player.attackMin}-${gameState.player.attackMax}`;
            document.getElementById('defense').textContent = gameState.player.defense;
            
            document.getElementById('monster-name').textContent = gameState.monster.name;
            document.getElementById('monster-hp').textContent = `${gameState.monster.hp}/${gameState.monster.maxHp}`;
            document.getElementById('monster-exp').textContent = gameState.monster.exp;
            document.getElementById('monster-loot').textContent = gameState.monster.loot.join('、');
        }
        
        // 添加日志
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('combat-log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString().slice(0,8)}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // 保持最多20条日志
            if (logDiv.children.length > 20) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }
        
        // 移动控制
        function move(direction) {
            const directions = {
                'up': '向上移动',
                'down': '向下移动',
                'left': '向左移动',
                'right': '向右移动'
            };
            addLog(`角色${directions[direction]}`, 'info');
            
            // 这里可以触发游戏中的实际移动
            if (window.gameScene && window.gameScene.movePlayer) {
                window.gameScene.movePlayer(direction);
            }
        }
        
        // 使用技能
        function useSkill(skill) {
            const skills = {
                'heal': { name: '治疗术', cost: 10, effect: '恢复生命值' },
                'magic': { name: '魔法攻击', cost: 15, effect: '造成魔法伤害' }
            };
            
            const skillInfo = skills[skill];
            if (gameState.player.mp >= skillInfo.cost) {
                gameState.player.mp -= skillInfo.cost;
                addLog(`使用了${skillInfo.name}，${skillInfo.effect}`, 'info');
                updateUI();
            } else {
                addLog('魔法值不足！', 'combat');
            }
        }
        
        // 攻击怪物
        function attack() {
            if (gameState.monster.hp <= 0) {
                addLog('怪物已经死亡！', 'info');
                return;
            }
            
            // 计算伤害
            const damage = Math.floor(
                Math.random() * (gameState.player.attackMax - gameState.player.attackMin + 1)
            ) + gameState.player.attackMin;
            
            gameState.monster.hp -= damage;
            addLog(`对${gameState.monster.name}造成了${damage}点伤害！`, 'combat');
            
            // 怪物反击
            if (gameState.monster.hp > 0) {
                const monsterDamage = Math.floor(Math.random() * 8) + 3;
                gameState.player.hp -= Math.max(1, monsterDamage - gameState.player.defense);
                addLog(`${gameState.monster.name}对你造成了${Math.max(1, monsterDamage - gameState.player.defense)}点伤害！`, 'combat');
            }
            
            // 检查怪物是否死亡
            if (gameState.monster.hp <= 0) {
                gameState.monster.hp = 0;
                addLog(`击败了${gameState.monster.name}，获得${gameState.monster.exp}点经验！`, 'loot');
                
                // 获得经验
                gameState.player.exp += gameState.monster.exp;
                
                // 检查升级
                if (gameState.player.exp >= gameState.player.maxExp) {
                    gameState.player.level++;
                    gameState.player.exp -= gameState.player.maxExp;
                    gameState.player.maxExp = Math.floor(gameState.player.maxExp * 1.5);
                    gameState.player.maxHp += 20;
                    gameState.player.hp = gameState.player.maxHp;
                    gameState.player.maxMp += 10;
                    gameState.player.mp = gameState.player.maxMp;
                    gameState.player.attackMin += 2;
                    gameState.player.attackMax += 3;
                    gameState.player.defense += 1;
                    addLog(`恭喜升级到${gameState.player.level}级！属性提升！`, 'loot');
                }
                
                // 掉落物品
                const loot = gameState.monster.loot[Math.floor(Math.random() * gameState.monster.loot.length)];
                addLog(`获得了${loot}！`, 'loot');
                
                // 刷新怪物
                setTimeout(() => {
                    refreshMonster();
                }, 1500);
            }
            
            // 检查玩家是否死亡
            if (gameState.player.hp <= 0) {
                gameState.player.hp = 0;
                addLog('你被怪物击败了！', 'combat');
                setTimeout(() => {
                    gameState.player.hp = Math.floor(gameState.player.maxHp * 0.3);
                    gameState.player.mp = Math.floor(gameState.player.maxMp * 0.5);
                    addLog('在安全区复活，恢复部分生命值和魔法值', 'info');
                    updateUI();
                }, 2000);
            }
            
            updateUI();
        }
        
        // 刷新怪物
        function refreshMonster() {
            const monsters = [
                { name: "野猪", hp: 50, exp: 10, loot: ["猪肉", "铜币"] },
                { name: "骷髅兵", hp: 80, exp: 15, loot: ["骨头", "铁剑", "铜币"] },
                { name: "狼", hp: 65, exp: 12, loot: ["狼皮", "狼牙", "铜币"] },
                { name: "哥布林", hp: 70, exp: 13, loot: ["哥布林耳朵", "短弓", "铜币"] }
            ];
            
            const monster = monsters[Math.floor(Math.random() * monsters.length)];
            gameState.monster = {
                name: monster.name,
                hp: monster.hp,
                maxHp: monster.hp,
                exp: monster.exp,
                loot: monster.loot
            };
            
            addLog(`发现了新的怪物：${monster.name}！`, 'info');
            updateUI();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            addLog('游戏初始化完成，开始冒险吧！', 'info');
            
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        move('up');
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        move('down');
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        move('left');
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        move('right');
                        break;
                    case ' ':
                        e.preventDefault();
                        attack();
                        break;
                    case '1':
                        useSkill('heal');
                        break;
                    case '2':
                        useSkill('magic');
                        break;
                }
            });
        });
        
        // 暴露给Phaser游戏使用
        window.gameState = gameState;
        window.addLog = addLog;
    </script>
</body>
</html>
